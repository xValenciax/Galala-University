<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GU Academic Records</title>
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: #f4f6f9;
      margin: 0;
      padding: 0;
      direction: rtl;
    }

    .container {
      max-width: 1000px;
      margin: auto;
      background: #fff;
      padding: 20px;
    }

    .header {
      background-color: #011a3e;
      color: white;
      padding: 10px 20px;
      font-size: 20px;
    }

    .student-info {
      display: flex;
      justify-content: space-between;
      padding: 20px;
      background-color: #e6ecf3;
      margin: 20px 0;
    }

    .student-info div {
      font-size: 18px;
    }

    .status {
      text-align: center;
      margin-bottom: 30px;
    }

    .status h2 {
      margin: 10px 0;
    }

    .grades-table {
      width: 100%;
      border-collapse: collapse;
    }

    .grades-table th, .grades-table td {
      border: 1px solid #ccc;
      padding: 10px;
      text-align: center;
    }

    .grades-table th {
      background-color: #f0f0f0;
    }

    .semester-label {
      float: left;
      background: #f0f0f0;
      padding: 5px 10px;
      margin-bottom: 20px;
      border-radius: 4px;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div class="header">
    GU Academic Records SSS
  </div>

  <div class="container">
    <div class="student-info">
      <div>حمدي محمد حمدي عمر</div>
    </div>

    <div class="status">
      <h2>GPA للفصل: 2.26</h2>
      <h2>GPA التراكمي: 2.19</h2>
      <h2>الوضع الأكاديمي: <strong>Probation</strong></h2>
    </div>

    <div class="semester-label">صف/صفوف 7</div>

    <table class="grades-table">
      <thead>
        <tr>
          <th>الفصل</th>
          <th>الوحدات</th>
          <th>التقدير</th>
          <th>نقاط التقدير</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td>BPT 111</td>
          <td>1.00</td>
          <td>C</td>
          <td>2.300</td>
        </tr>
        <tr>
          <td>BPT 313</td>
          <td>3.00</td>
          <td>B</td>
          <td>2.3</td>
        </tr>
        <tr>
          <td>CMS 383</td>
          <td>2.00</td>
          <td>B</td>
          <td>3.000</td>
        </tr>
        <tr>
          <td>COM 11</td>
          <td>2.00</td>
          <td>D</td>
          <td>1.680</td>
        </tr>
        <tr>
          <td>GEO 217</td>
          <td>2.00</td>
          <td>FA</td>
          <td></td>
        </tr>
        <tr>
          <td>LIB 116</td>
          <td>2.00</td>
          <td>C</td>
          <td>2.100</td>
        </tr>
        <tr>
          <td>PSC 11</td>
          <td>2.00</td>
          <td>C</td>
          <td>2.000</td>
        </tr>
      </tbody>
    </table>
  </div>
</body>
</html>

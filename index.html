<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>Galala University PeopleSoft</title>
  <style>
    body {
      font-family: Tahoma, sans-serif;
      background-color: #f2f3f5;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      direction: rtl;
    }

    .login-container {
      background-color: white;
      padding: 2rem;
      border-radius: 10px;
      width: 400px;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
      text-align: center;
    }

    .logo {
      width: 120px;
      margin-bottom: 1rem;
    }

    form {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    input, select, button {
      padding: 0.5rem;
      font-size: 1rem;
    }

    button {
      background-color: #1565c0;
      color: white;
      border: none;
      cursor: pointer;
      border-radius: 5px;
    }

    button:hover {
      background-color: #0d47a1;
    }

    .error-message {
      color: red;
      margin-top: 0.5rem;
      font-size: 0.9rem;
    }
  </style>
</head>
<body>
  <div class="login-container">
    <img src="king.png" alt="Galala Logo" class="logo" />
    <h2>Galala University PeopleSoft</h2>

    <form id="loginForm">
      <label for="username">معرف مستخدم</label>
      <input type="text" id="username" name="username" required />

      <label for="password">كلمة المرور</label>
      <input type="password" id="password" name="password" required />

      <label for="language">حدد إحدى اللغات</label>
      <select id="language">
        <option value="arabic">العربية</option>
        <option value="english">English</option>
      </select>

      <button type="submit">تسجيل الدخول</button>
      <div id="error" class="error-message"></div>
    </form>
  </div>

  <script>
    document.getElementById('loginForm').addEventListener('submit', function (e) {
      e.preventDefault();

      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value.trim();
      const errorDiv = document.getElementById('error');

      if (username === '224124968' && password === '28NU2ZJ6') {
        window.location.href = 'home.html'; // <-- replace with your target file
      } else {
        errorDiv.textContent = 'معرف المستخدم أو كلمة المرور غير صحيحة.';
      }
    });
  </script>
</body>
</html>
